    - src: https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/photoswipe.min.css
      type: style

KaTeX:
    - src: https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css
      type: style

    - src: https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js

{{ define "body-class" }}article-page ws-about-page{{ end }}

{{ define "main" }}
<section class="ws-about-wrap">
    <header class="ws-about-header">
        <h1>{{ .Title }}</h1>
        <p class="ws-page-poetic-line">{{ if eq .Site.Language.Lang "zh-cn" }}把散落的思绪，整理成可回望的路径{{ else }}Gathering scattered thoughts into paths worth revisiting.{{ end }}</p>
    </header>

    <article class="ws-about-content article-content">
        {{ .Content }}
    </article>
</section>

{{ partialCached "footer/footer" . }}
{{ end }}

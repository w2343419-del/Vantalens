{{- partial "helper/external" (dict "Context" . "Namespace" "KaTeX") -}}
<script>
    const fallbackKatexAssets = {
        css: "https://unpkg.com/katex@0.16.9/dist/katex.min.css",
        js: "https://unpkg.com/katex@0.16.9/dist/katex.min.js",
        autoRender: "https://unpkg.com/katex@0.16.9/dist/contrib/auto-render.min.js"
    };

    const loadScript = (src) => new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
    });

    const loadStyle = (href) => {
        if (document.querySelector(`link[href="${href}"]`)) {
            return;
        }
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = href;
        document.head.appendChild(link);
    };

    const ensureKatexAvailable = async () => {
        if (typeof renderMathInElement === "function" && typeof katex === "object") {
            return;
        }

        loadStyle(fallbackKatexAssets.css);

        if (typeof katex !== "object") {
            await loadScript(fallbackKatexAssets.js);
        }

        if (typeof renderMathInElement !== "function") {
            await loadScript(fallbackKatexAssets.autoRender);
        }
    };

    const renderMath = () => {
        const elementsToRender = [".main-article", ".widget--toc"];
        const renderOptions = {
            delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\(", right: "\\)", display: false },
                { left: "\\[", right: "\\]", display: true }
            ],
            ignoredClasses: ["gist"],
            throwOnError: false,
            strict: "ignore"
        };

        elementsToRender.forEach(selector => {
            const element = document.querySelector(selector);
            if (!element) {
                return;
            }

            if (typeof renderMathInElement === "function") {
                try {
                    renderMathInElement(element, renderOptions);
                } catch (error) {
                    console.warn("KaTeX auto-render failed:", error);
                }
            }

            if (typeof katex === "object") {
                element.querySelectorAll(".math.inline, .math.display").forEach(mathElement => {
                    const expression = mathElement.textContent?.trim();
                    if (!expression) {
                        return;
                    }

                    try {
                        katex.render(expression, mathElement, {
                            displayMode: mathElement.classList.contains("display"),
                            throwOnError: false,
                            strict: "ignore"
                        });
                    } catch (error) {
                        console.warn("KaTeX passthrough render failed:", error);
                    }
                });
            }
        });
    };

    window.addEventListener("DOMContentLoaded", async () => {
        try {
            await ensureKatexAvailable();
        } catch (error) {
            console.warn("KaTeX fallback load failed:", error);
        }

        renderMath();
    });
</script>
